<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Online - Barranc de la Serra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-8 shadow-xl">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <div class="inline-block bg-white/20 rounded-full p-4 mb-4">
                <i class="fas fa-mountain text-5xl"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold mb-2">
                Barranc de la Serra
            </h1>
            <p class="text-xl text-indigo-100">Check-in Online - Rápido y Seguro</p>
        </div>
    </div>

    <!-- Formulario -->
    <div class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- Info importante -->
        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r-lg">
            <div class="flex items-start">
                <i class="fas fa-info-circle text-blue-500 text-xl mr-3 mt-1"></i>
                <div>
                    <p class="font-semibold text-blue-900">Por favor, completa este formulario antes de tu llegada</p>
                    <p class="text-sm text-blue-700 mt-1">Es un requisito legal. Tus datos están protegidos.</p>
                </div>
            </div>
        </div>

        <form id="checkinForm" class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            
            <!-- Sección 0: Información de Reserva -->
            <div class="bg-gradient-to-r from-green-500 to-teal-500 p-6">
                <h2 class="text-2xl font-bold text-white flex items-center">
                    <i class="fas fa-clipboard-list mr-3"></i>
                    Información de la Reserva
                </h2>
            </div>
            
            <div class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Número de personas -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Número de Personas <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-users"></i>
                            </span>
                            <select name="numero_personas" 
                                    id="numero_personas"
                                    required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                                <option value="">Selecciona...</option>
                                <option value="1">1 persona</option>
                                <option value="2">2 personas</option>
                                <option value="3">3 personas</option>
                                <option value="4">4 personas</option>
                                <option value="5">5 personas</option>
                                <option value="6">6 personas</option>
                                <option value="7">7 personas</option>
                                <option value="8">8 personas</option>
                                <option value="9">9 personas</option>
                                <option value="10">10 personas</option>
                                <option value="11">11 personas</option>
                                <option value="12">12 personas</option>
                                <option value="13">13 personas</option>
                                <option value="14">14 personas</option>
                                <option value="15">15 personas</option>
                                <option value="16">16 personas</option>
                                <option value="17">17 personas</option>
                                <option value="18">18 personas</option>
                                <option value="19">19 personas</option>
                                <option value="20">20 personas</option>
                                <option value="21">21 personas</option>
                                <option value="22">22 personas</option>
                                <option value="23">23 personas</option>
                                <option value="24">24 personas</option>
                                <option value="25">25 personas</option>
                                <option value="26">26 personas</option>
                                <option value="27">27 personas</option>
                            </select>
                        </div>
                    </div>

                    <!-- Origen de la reserva -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Metodo de pago: <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-globe"></i>
                            </span>
                            <select name="origen_reserva" 
                                    required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                                <option value="">Selecciona...</option>
                                <option value="Booking">Booking.com</option>
                                <option value="Airbnb">Airbnb</option>
                                <option value="Directo">Trasferencia/Tarjeta (teléfono/email)</option>
                                <option value="Web">Web del albergue</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Fechas de estancia -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Fecha de Entrada <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-calendar-plus"></i>
                            </span>
                            <input type="date" 
                                   name="fecha_entrada" 
                                   id="fecha_entrada"
                                   required
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Fecha de Salida <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-calendar-minus"></i>
                            </span>
                            <input type="date" 
                                   name="fecha_salida" 
                                   id="fecha_salida"
                                   required
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contenedor dinámico para personas -->
            <div id="personasContainer"></div>

            <!-- Política de Privacidad -->
            <div class="bg-gray-50 px-8 pt-6 pb-4">
                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                    <label class="flex items-start cursor-pointer">
                        <input type="checkbox" 
                               name="acepta_privacidad" 
                               id="acepta_privacidad"
                               required 
                               class="mt-1 mr-3 w-5 h-5 cursor-pointer flex-shrink-0">
                        <span class="text-sm text-gray-700">
                            <i class="fas fa-shield-alt text-blue-600 mr-1"></i>
                            He leído y acepto la 
                            <a href="#" onclick="mostrarPrivacidad(); return false;" class="text-indigo-600 underline font-semibold hover:text-indigo-800">
                                Política de Privacidad y Protección de Datos
                            </a>. 
                            Entiendo que mis datos serán tratados conforme al RGPD y comunicados al Ministerio del Interior según obliga la ley.
                            <span class="text-red-500 font-bold">*</span>
                        </span>
                    </label>
                </div>
            </div>

            <!-- Botón enviar -->
            <div class="bg-gray-50 px-8 pb-8">
                <button type="submit" 
                        id="submitBtn"
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 px-8 rounded-xl font-bold text-lg hover:from-indigo-700 hover:to-purple-700 transform hover:scale-105 transition-all duration-200 shadow-xl flex items-center justify-center gap-3">
                    <i class="fas fa-check-circle text-2xl"></i>
                    <span>Completar Check-in</span>
                </button>
                
                <div id="mensaje" class="hidden mt-6 p-4 rounded-lg text-center font-semibold"></div>
            </div>

        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-gray-600">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <i class="fas fa-lock text-3xl text-green-500 mb-3"></i>
                <p class="font-semibold">🔒 Tus datos están protegidos</p>
                <p class="text-sm mt-2">Solo se usan para cumplir con la normativa legal de hospedajes</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('checkinForm');
        const submitBtn = document.getElementById('submitBtn');
        const mensaje = document.getElementById('mensaje');
        const numeroPersonasSelect = document.getElementById('numero_personas');
        const personasContainer = document.getElementById('personasContainer');
        const fechaEntrada = document.getElementById('fecha_entrada');
        const fechaSalida = document.getElementById('fecha_salida');
        
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzd7mMAPqGDtZJ3ESb3jkq1KoOMi2C6ur7DWJ1HBp4aTH5RZ9iSQTNvirpdkp32oMmBpQ/exec';
        
        fechaEntrada.addEventListener('change', () => {
            fechaSalida.min = fechaEntrada.value;
        });

        numeroPersonasSelect.addEventListener('change', (e) => {
            const numPersonas = parseInt(e.target.value);
            personasContainer.innerHTML = '';
            
            if (numPersonas > 0) {
                for (let i = 1; i <= numPersonas; i++) {
                    personasContainer.innerHTML += generarFormularioPersona(i);
                }
                for (let i = 1; i <= numPersonas; i++) {
                    activarListenersPersona(i);
                }
            }
        });

        function generarFormularioPersona(num) {
            const colores = [
                'from-indigo-500 to-purple-500',
                'from-purple-500 to-pink-500',
                'from-pink-500 to-red-500',
                'from-red-500 to-orange-500',
                'from-orange-500 to-yellow-500',
                'from-yellow-500 to-green-500',
                'from-green-500 to-teal-500',
                'from-teal-500 to-cyan-500',
                'from-cyan-500 to-blue-500',
                'from-blue-500 to-indigo-500'
            ];
            const color = colores[(num - 1) % colores.length];
            
            return `
            <div class="bg-gradient-to-r ${color} p-6">
                <h2 class="text-2xl font-bold text-white flex items-center">
                    <i class="fas fa-user mr-3"></i>
                    Persona ${num} ${num === 1 ? '(Titular de la reserva)' : ''}
                </h2>
            </div>
            
            <div class="p-8 space-y-6 border-b-4 border-gray-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Nombre <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" 
                                   name="persona_${num}_nombre" 
                                   required 
                                   placeholder="Ej: Juan"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Primer Apellido <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-user-tag"></i>
                            </span>
                            <input type="text" 
                                   name="persona_${num}_apellido1" 
                                   required 
                                   placeholder="Ej: García"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Segundo Apellido <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-user-tag"></i>
                            </span>
                            <input type="text" 
                                   name="persona_${num}_apellido2" 
                                   required 
                                   placeholder="Ej: López"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Viajo en el grupo con <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-people-arrows"></i>
                            </span>
                            <select name="persona_${num}_parentesco" 
                                    required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition appearance-none">
                                <option value="">Selecciona...</option>
                                <option value="Cónyuge">Mi cónyuge</option>
                                <option value="Pareja">Mi pareja</option>
                                <option value="Hijo/a">Mi hijo/a</option>
                                <option value="Padre/Madre">Mi padre/madre</option>
                                <option value="Hermano/a">Mi hermano/a</option>
                                <option value="Familia">Familia</option>
                                <option value="Amigos">Amigos</option>
                                <option value="Solo/a">Viajo solo/a</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">
                            <i class="fas fa-info-circle"></i> 
                            Indica en general con quién viajas
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Tipo de Documento <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-passport"></i>
                            </span>
                            <select name="persona_${num}_tipo_documento" 
                                    id="persona_${num}_tipo_documento"
                                    required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition appearance-none">
                                <option value="">Selecciona...</option>
                                <option value="DNI">DNI</option>
                                <option value="NIE">NIE</option>
                                <option value="Pasaporte">Pasaporte</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Número de Documento <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-hashtag"></i>
                            </span>
                            <input type="text" 
                                   name="persona_${num}_numero_documento" 
                                   required 
                                   placeholder="Ej: 12345678A"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>

                    <div id="persona_${num}_soporte_container" class="hidden md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Número de Soporte <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-barcode"></i>
                            </span>
                            <input type="text" 
                                   name="persona_${num}_numero_soporte" 
                                   id="persona_${num}_numero_soporte"
                                   placeholder="Ej: ABC123456"
                                   pattern="[A-Z]{3}[0-9]{6}"
                                   title="Formato: 3 letras mayúsculas + 6 números"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                        <p class="text-xs text-gray-500 mt-1">
                            <i class="fas fa-info-circle"></i> 
                            Lo encuentras en la parte superior derecha del DNI
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Nacionalidad <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-globe"></i>
                            </span>
                            <input type="text" 
                                   name="persona_${num}_nacionalidad" 
                                   required 
                                   placeholder="Ej: España"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Fecha de Nacimiento <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-calendar"></i>
                            </span>
                            <input type="date" 
                                   name="persona_${num}_fecha_nacimiento" 
                                   required
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Sexo <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-venus-mars"></i>
                            </span>
                            <select name="persona_${num}_sexo" 
                                    required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition appearance-none">
                                <option value="">Selecciona...</option>
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Teléfono <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-phone"></i>
                            </span>
                            <input type="tel" 
                                   name="persona_${num}_telefono" 
                                   required 
                                   placeholder="Ej: +34 600 123 456"
                                   pattern="[+]?[0-9\\s]+"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Email <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" 
                                   name="persona_${num}_email" 
                                   required 
                                   placeholder="Ej: tu@email.com"
                                   class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="font-bold text-gray-700 mb-4 flex items-center">
                        <i class="fas fa-map-marked-alt mr-2"></i>
                        Dirección del Domicilio
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">
                                Calle/Avenida <span class="text-red-500">*</span>
                            </label>
                            <input type="text" 
                                   name="persona_${num}_calle" 
                                   required 
                                   placeholder="Ej: Calle Mayor"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">
                                Número/Puerta <span class="text-red-500">*</span>
                            </label>
                            <input type="text" 
                                   name="persona_${num}_numero_puerta" 
                                   required 
                                   placeholder="Ej: 24, 3, 5B"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">
                                Piso (opcional)
                            </label>
                            <input type="text" 
                                   name="persona_${num}_piso" 
                                   placeholder="Ej: 2º, Bajo, Ático"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">
                                Código Postal <span class="text-red-500">*</span>
                            </label>
                            <input type="text" 
                                   name="persona_${num}_codigo_postal" 
                                   required 
                                   placeholder="Ej: 08001"
                                   pattern="[0-9]{4,10}"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">
                                Ciudad <span class="text-red-500">*</span>
                            </label>
                            <input type="text" 
                                   name="persona_${num}_ciudad" 
                                   required 
                                   placeholder="Ej: Barcelona"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">
                                Provincia <span class="text-red-500">*</span>
                            </label>
                            <input type="text" 
                                   name="persona_${num}_provincia" 
                                   required 
                                   placeholder="Ej: Barcelona"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">
                                País <span class="text-red-500">*</span>
                            </label>
                            <input type="text" 
                                   name="persona_${num}_pais" 
                                   required 
                                   placeholder="Ej: España"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none transition">
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function activarListenersPersona(num) {
            const tipoDoc = document.getElementById(`persona_${num}_tipo_documento`);
            const soporteContainer = document.getElementById(`persona_${num}_soporte_container`);
            const numeroSoporte = document.getElementById(`persona_${num}_numero_soporte`);
            
            if (tipoDoc) {
                tipoDoc.addEventListener('change', (e) => {
                    if (e.target.value === 'DNI' || e.target.value === 'NIE') {
                        soporteContainer.classList.remove('hidden');
                        numeroSoporte.required = true;
                    } else {
                        soporteContainer.classList.add('hidden');
                        numeroSoporte.required = false;
                        numeroSoporte.value = '';
                    }
                });
            }

            if (numeroSoporte) {
                numeroSoporte.addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase();
                });
            }
        }

        form.addEventListener('submit', async (e) => {

            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            try {

                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
